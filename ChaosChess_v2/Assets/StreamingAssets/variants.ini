[chaoschess:chess]

# ================================================================
# 나이트라이더 [카드: 무한궤도]
# 나이트 행마를 직선으로 반복할 수 있는 기물
# 예: 나이트가 (0,0)에서 (2,1)방향으로 계속 이동 가능
# ================================================================
customPiece1 = z:NN

# ================================================================
# 챈슬러 [카드: 성 위의 말 - 나이트+룩 합체 결과]
# 룩(직선 슬라이더) + 나이트(L자 도약) 행마를 모두 가진 기물
# ================================================================
customPiece2 = y:RN

# ================================================================
# 비숍 행마 전용 [카드: 풍차 - 룩이 일시적으로 비숍처럼 이동]
# 사선 방향으로만 이동 가능, 직선 이동 불가
# ================================================================
customPiece3 = x:B

# ================================================================
# 룩 행마 전용 [카드: 풍차 - 비숍이 일시적으로 룩처럼 이동]
# 직선 방향으로만 이동 가능, 사선 이동 불가
# ================================================================
customPiece4 = v:R

# ================================================================
# 앞뒤 이동 및 잡기 가능 폰 [카드: 민첩]
# 기본 폰 행마(fW, fF) + 뒤로 이동(bW) + 뒤로 잡기(cbW) 추가
# fW=전진, cW=전진잡기, bW=후진, cbW=후진잡기, fF=사선전진
# ================================================================
customPiece5 = u:fWcfWbWcbWfF

# ================================================================
# 전방 사선 이동+잡기 가능 폰 [카드: 조준]
# 기본 전진(fW) + 전방 사선 이동(mfF) + 전방 사선 잡기(cfF) 추가
# mfF=사선 이동만(잡기불가), cfF=사선 잡기만(이동불가)
# ================================================================
customPiece6 = t:fWcfFmfF

# ================================================================
# 아마존 [카드: 정신 집중 - 4턴 대기 후 승격 결과]
# 퀸(직선+사선 슬라이더) + 나이트(L자 도약) 행마를 모두 가진 기물
# ================================================================
customPiece7 = s:QN

# ================================================================
# 배수진 전진 제한 기물들 [카드: 배수진]
# 3턴 동안 자신과 상대 모두 전진 방향으로만 이동 가능하도록 변환
# f 접두사 = forward(전진) 방향만 허용
# ================================================================

# 배수진용 룩: 전진 방향(앞)으로만 직선 이동
customPiece9 = o:fR

# 배수진용 비숍: 전진 방향 사선으로만 이동
customPiece10 = i:fB

# 배수진용 퀸: 전진 방향(앞+사선 앞)으로만 이동
customPiece11 = h:fQ

# 배수진용 나이트: 전진 방향 L자 도약만 허용
customPiece12 = g:fN

# 배수진용 킹: 전진 방향 1칸 이동만 허용
customPiece16 = j:fK

# ================================================================
# 진화(각성) 로직용 중간 단계 기물 [카드: 각성 계열]
# 기물이 단계적으로 승격될 때 사용하는 임시 기물
# 나이트→비숍→퀸 순서로 승격
# ================================================================

# 진화 1단계: 나이트 행마 (승격 전 임시)
customPiece13 = e:N

# 진화 2단계: 비숍 행마 (승격 중간)
customPiece14 = d:B

# 진화 3단계: 퀸 행마 (최종 승격)
customPiece15 = c:Q

# ================================================================
# 이동 불가 기물 [카드: 성벽, 어둠 속의 손, 무하한, 정신 집중 대기 단계]
# 행마법 없음 → 아무 곳으로도 이동 불가
# 성벽: 빈 칸에 배치하는 장애물로 사용, 공격받으면 게임 코드로 삭제 처리
# 어둠 속의 손: 상대 기물을 이 기물로 교체하여 2턴간 이동 불가 구현
# 무하한: 효과 기물을 이 기물로 교체하여 이동 불가 구현, 반경 1칸 접근 제한은 게임 코드에서 처리
# 정신 집중: 4턴 대기 구현용, 이후 아마존(s)으로 교체
# ================================================================
customPiece17 = a:

# ================================================================
# 하극상: 퀸을 킹 행마로 제한 [카드: 하극상]
# 상대 퀸을 이 기물로 교체하여 3턴간 전방향 1칸 이동만 허용
# K = 킹과 동일한 8방향 1칸 이동
# ================================================================
customPiece18 = w:K

# ================================================================
# 신속행군: 2칸 전진 가능 폰 [카드: 신속행군]
# 기본 폰 행마에서 추가로 2칸 전진(fWfW)이 가능한 폰
# fWfW = 앞으로 1칸 이동 후 다시 1칸(장애물 없을 때만) / cfF = 사선 전진 잡기
# 주의: 이 기물은 1회성으로 사용 후 게임 코드에서 기본 폰으로 롤백해야 함
# ================================================================
customPiece19 = q:fWfWcfF

# ================================================================
# 벽력일섬: 상하좌우 3칸 점프 [카드: 벽력일섬]
# 전방향 3칸으로 그 사이에 사이에 기물이 있어도 이동 가능
# W = 전방향 1칸 이동, / D = 전방향 2칸 점프 / H = 전방향 3칸 점프
# ================================================================
customPiece20 = m:WDH
